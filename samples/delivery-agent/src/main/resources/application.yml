server:
  port: 9000

spring:
  ai:
    bedrock:
      aws:
        region: ${BEDROCK_REGION:ap-northeast-2}
      converse:
        chat:
          options:
            model: ${BEDROCK_MODEL_ID:}
            max-tokens: ${BEDROCK_MAX_TOKENS:8096}
    a2a:
      server:
        enabled: true
        url: ${A2A_SERVER_URL:}
    mcp:
      server:
        name: delivery-agent
        version: 1.0.0
        protocol: STREAMABLE
