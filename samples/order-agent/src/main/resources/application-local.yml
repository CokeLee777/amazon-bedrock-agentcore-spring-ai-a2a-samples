server:
  port: 9001

spring:
  config:
    activate:
      on-profile: local
  ai:
    a2a:
      server:
        enabled: true
        url: http://localhost:${server.port}
      remote:
        agents:
          delivery-agent:
            url: http://localhost:9002
          payment-agent:
            url: http://localhost:9003

logging:
  level:
    io.github.cokelee777: DEBUG
    org.springframework.ai: DEBUG
